<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Navigate to Stop - Silk Value Collector</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Sans-Serif Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
<style data-purpose="layout">
    .bottom-nav {
      height: 60px;
      border-top: 1px solid #000000;
    }
    .main-content {
      padding-bottom: 80px; /* Space for bottom nav */
    }
  </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col">
<!-- BEGIN: TopBar -->
<header class="sticky top-0 z-10 bg-white border-b border-gray-200 px-4 h-14 flex items-center" data-purpose="header-navigation">
<!-- Back Button Icon -->
<button aria-label="Go back" class="p-1 -ml-1">
<svg fill="none" height="24" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<h1 class="ml-4 text-lg font-bold">Navigate to Stop</h1>
</header>
<!-- END: TopBar -->
<!-- BEGIN: MainContent -->
<main class="flex-grow p-4 main-content flex flex-col" data-purpose="screen-content">
<!-- BEGIN: StopDetailsCard -->
<section class="bg-white border border-black rounded-lg p-4 mb-6 shadow-sm" data-purpose="stop-card">
<div class="flex items-start mb-4">
<!-- Stop Number Indicator -->
<div class="bg-black text-white w-8 h-8 rounded-full flex items-center justify-center font-bold mr-3 flex-shrink-0">
          2
        </div>
<!-- Reeler Info -->
<div>
<h2 class="text-xl font-bold leading-tight">Suresh Raina</h2>
<p class="text-gray-500 text-sm">Madanapalli</p>
<p class="text-gray-500 text-sm mt-0.5">Expected: 12.0 kg</p>
</div>
</div>
<!-- Map Thumbnail -->
<div class="w-full h-48 rounded-lg overflow-hidden bg-gray-100 mb-4 border border-gray-100" data-purpose="map-preview">
<!-- Grayscale map placeholder -->
<img alt="Map showing stop location" class="w-full h-full object-cover grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmKUBZavMynxc9iIjcSrwVPNpDKYQOzlWvK8SY7ebFX9L-rLfEXVUfqzg9k1VzZHY7lJM9ydT_wXE84i1h4Or_sN-wE2uITTCJGePtRYDfYVaBkt6Zh3qbqS_LYQVaI4glJ_btq7NI1RggHrh3KTufUDDAPYpwE6lEWueN_5MTXRc82qux0IfsycGyHGq20Ys4-eU3P1wGbHEIauxopq3nVrmLNRQohs-jpU6T7xeLDKF-hTHAUm2JknJvaEQdJ7hnYJ5x1L2C0fI"/>
</div>
<!-- Distance and Time -->
<div class="flex items-center text-gray-500 text-sm">
<svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="mr-3">2.4 km away</span>
<svg class="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span>Approx. 8 min</span>
</div>
</section>
<!-- END: StopDetailsCard -->
<!-- Progress Indicator -->
<div class="text-center mb-auto" data-purpose="route-progress">
<p class="text-gray-500 text-sm">Stop 2 of 7 on today's route</p>
</div>
<!-- BEGIN: ActionButtons -->
<div class="space-y-3 mt-8" data-purpose="primary-actions">
<!-- Primary Navigation Button -->
<button class="w-full bg-black text-white font-bold h-[52px] rounded-md active:bg-gray-800 transition-colors">
        Start Navigation
      </button>
<!-- Secondary Reach Button -->
<button class="w-full bg-white border border-black text-black font-bold h-[52px] rounded-md active:bg-gray-50 transition-colors">
        I Have Reached
      </button>
</div>
<!-- END: ActionButtons -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white bottom-nav flex justify-around items-center px-2" data-purpose="bottom-navigation">
<!-- Home Tab -->
<a class="flex flex-col items-center justify-center space-y-1" href="#">
<svg class="h-6 w-6 text-[#AAAAAA]" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] text-[#AAAAAA]">Home</span>
</a>
<!-- Map Tab (Active) -->
<a class="flex flex-col items-center justify-center space-y-1" href="#">
<svg class="h-6 w-6 text-black" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 3L3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"></path>
</svg>
<span class="text-[10px] text-black font-bold">Map</span>
</a>
<!-- Collections Tab -->
<a class="flex flex-col items-center justify-center space-y-1" href="#">
<svg class="h-6 w-6 text-[#AAAAAA]" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] text-[#AAAAAA]">Collections</span>
</a>
<!-- Settings Tab -->
<a class="flex flex-col items-center justify-center space-y-1" href="#">
<svg class="h-6 w-6 text-[#AAAAAA]" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] text-[#AAAAAA]">Settings</span>
</a>
</nav>
<!-- END: BottomNavBar -->
</body></html>
