<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#f7f7f7",
                        "background-dark": "#191919",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<title>Home Dashboard</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen flex-col max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-6 py-4 bg-white dark:bg-background-dark border-b border-slate-100 dark:border-slate-800 sticky top-0 z-10">
<h1 class="text-xl font-bold tracking-tight text-primary dark:text-white uppercase">Dashboard</h1>
<button class="relative p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-white">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-red-600 rounded-full border-2 border-white dark:border-background-dark"></span>
</button>
</header>
<!-- Welcome Banner -->
<div class="px-6 pt-8 pb-4">
<div class="flex items-center gap-4">
<div class="h-16 w-16 rounded-full bg-primary/10 dark:bg-primary/30 flex items-center justify-center border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-3xl text-primary dark:text-slate-100">person</span>
</div>
<div>
<h2 class="text-2xl font-bold text-primary dark:text-white leading-tight">Welcome, Alex</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">ID: 12345</p>
</div>
</div>
</div>
<!-- Pending Badge Section -->
<div class="px-6 py-2">
<div class="inline-flex items-center gap-2 px-3 py-1 bg-primary text-white dark:bg-slate-100 dark:text-primary rounded-full text-xs font-bold uppercase tracking-wider">
<span class="material-symbols-outlined text-xs">info</span>
                Pending Payment
            </div>
</div>
<!-- QR Code Section -->
<div class="px-6 py-8 flex flex-col items-center">
<div class="bg-white p-6 rounded-xl border-2 border-slate-100 dark:border-slate-800 shadow-sm flex flex-col items-center">
<div class="w-56 h-56 bg-white flex items-center justify-center border border-slate-100">
<div class="w-full h-full bg-center bg-no-repeat bg-contain" data-alt="High contrast scannable QR code for payments" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB1VEuZTvB8BJ-XGwEv2TPxrLd-IAF5IrRSiplaE41pqKGWL8TGIt91SPUKkGkiOVL7yM-9Kb8f8SA2dBikxBfwLiMXqvCAQ-ym1pW6BdoVnZ-z_U_vLPtCdbOB1JvAEy7edV_pNPUMMHGQXt1gVgKYLuV1i3mo7gBDTAV8_lKIz5UTOj5i0n3YpDEPZM0Wmso-PuHV6_bxluwQzDVUREFhV7Gq-baHR_geqbpHKjlfPtFLjFxuTyd5D8A2Qhp8yjHym-jrQ4JnDfE");'></div>
</div>
<p class="mt-4 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em]">Scan to Collect</p>
</div>
</div>
<!-- Stats Grid -->
<div class="px-6 grid grid-cols-1 gap-3 mb-24">
<div class="flex items-center justify-between p-5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-background-dark shadow-sm">
<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest">Today</p>
<p class="text-2xl font-bold text-primary dark:text-white mt-1">₹0</p>
</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700">today</span>
</div>
<div class="flex items-center justify-between p-5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-background-dark shadow-sm">
<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest">This Month</p>
<p class="text-2xl font-bold text-primary dark:text-white mt-1">₹0</p>
</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700">calendar_month</span>
</div>
<div class="flex items-center justify-between p-5 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-background-dark shadow-sm">
<div>
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest">Lifetime</p>
<p class="text-2xl font-bold text-primary dark:text-white mt-1">₹0</p>
</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700">history</span>
</div>
</div>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white dark:bg-background-dark border-t border-slate-100 dark:border-slate-800 px-6 py-3 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-primary dark:text-white" href="#">
<span class="material-symbols-outlined font-variation-fill">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">library_books</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Collections</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Payments</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Profile</span>
</a>
</nav>
</div>
<style>
        .font-variation-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</body></html>
