<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Factory Gate App - Login</title>

              "surface": "#f9f9f9",
              "primary-fixed-dim": "#474747",
              "on-primary": "#e2e2e2",
              "on-secondary": "#ffffff",
              "inverse-primary": "#c6c6c6",
              "outline-variant": "#c6c6c6",

              "on-tertiary-container": "#ffffff",
              "surface-dim": "#dadada",
              "on-secondary-container": "#1b1c1c",

              "secondary-fixed": "#c7c6c6",
              "primary": "#000000",
              "on-secondary-fixed": "#1b1c1c",
              "surface-variant": "#e2e2e2",
              "inverse-on-surface": "#f1f1f1",
              "on-background": "#1b1b1b",
              "surface-tint": "#5e5e5e",
              "secondary-fixed-dim": "#ababab",
              "secondary": "#5e5e5e",

            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]

            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md flex flex-col space-y-10">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center text-center space-y-2">
<div class="w-20 h-20 bg-primary flex items-center justify-center rounded-lg mb-4">
<span class="material-symbols-outlined text-on-primary text-5xl" data-icon="factory">factory</span>
</div>
<h1 class="font-headline font-black text-4xl tracking-tighter uppercase text-primary">SILK VALUE</h1>
<p class="font-label font-bold text-sm tracking-[0.2em] text-on-surface-variant uppercase">Factory Gate App</p>
</div>
<!-- Login Form Container -->
<div class="space-y-8">
<!-- Mobile Number Input Group -->
<div class="space-y-2">
<label class="font-label font-bold text-xs uppercase tracking-wider text-primary">Mobile Number</label>
<div class="flex space-x-2">
<div class="w-20 h-[52px] border border-primary flex items-center justify-center bg-white font-bold text-lg">
                        +91
                    </div>
<input class="flex-1 h-[52px] border border-primary bg-white px-4 font-bold text-lg focus:ring-0 focus:border-[2px] placeholder:text-outline-variant outline-none" placeholder="00000 00000" type="tel"/>
</div>
<button class="w-full h-[52px] bg-primary text-on-primary font-label font-bold uppercase tracking-widest active:bg-zinc-800 transition-colors">
                    Get OTP
                </button>
</div>
<!-- OTP Verification Group -->
<div class="space-y-4">
<label class="font-label font-bold text-xs uppercase tracking-wider text-primary">One-Time Password</label>
<div class="grid grid-cols-6 gap-2">
<input class="h-14 w-full border border-primary text-center font-bold text-xl bg-white focus:ring-0 focus:border-[2px] outline-none" maxlength="1" type="text"/>
<input class="h-14 w-full border border-primary text-center font-bold text-xl bg-white focus:ring-0 focus:border-[2px] outline-none" maxlength="1" type="text"/>
<input class="h-14 w-full border border-primary text-center font-bold text-xl bg-white focus:ring-0 focus:border-[2px] outline-none" maxlength="1" type="text"/>
<input class="h-14 w-full border border-primary text-center font-bold text-xl bg-white focus:ring-0 focus:border-[2px] outline-none" maxlength="1" type="text"/>
<input class="h-14 w-full border border-primary text-center font-bold text-xl bg-white focus:ring-0 focus:border-[2px] outline-none" maxlength="1" type="text"/>
<input class="h-14 w-full border border-primary text-center font-bold text-xl bg-white focus:ring-0 focus:border-[2px] outline-none" maxlength="1" type="text"/>
</div>
<button class="w-full h-[52px] bg-primary text-on-primary font-label font-bold uppercase tracking-widest active:bg-zinc-800 transition-colors">
                    Verify &amp; Login
                </button>
</div>
<!-- Information Card -->
<div class="bg-surface-container-low p-4 rounded-lg border border-outline-variant flex items-start space-x-3">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
<div class="space-y-1">
<p class="font-bold text-xs uppercase tracking-tight text-primary">Security Note</p>
<p class="text-sm text-on-surface-variant leading-relaxed">
                        Ensure you are using an authorized device for gate operations. OTP is valid for 10 minutes.
                    </p>
</div>
</div>
</div>
<!-- Footer Caption -->
<div class="pt-8 border-t border-outline-variant text-center">
<p class="font-label font-bold text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">
                Login persists until explicit logout.
            </p>
</div>
</div>
</body></html>
