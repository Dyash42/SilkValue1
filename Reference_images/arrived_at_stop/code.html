<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arrived at Stop - Silk Value Collector</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#ffffff",
                        "background-dark": "#191919",
                        "neutral-custom": "#888888",
                        "inactive-custom": "#AAAAAA"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-primary min-h-screen flex flex-col">
<!-- Top Bar -->
<header class="sticky top-0 z-10 bg-white border-b border-primary h-14 flex items-center px-4">
<div class="flex-1 flex items-center">
<button class="flex items-center justify-center">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
</div>
<h1 class="flex-1 text-center text-primary font-bold text-base whitespace-nowrap">Arrived at Stop</h1>
<div class="flex-1"></div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-4 py-8">
<!-- Confirmation Card -->
<div class="w-full max-w-md bg-white border border-primary rounded-lg p-4 mb-8">
<div class="flex flex-col gap-1">
<h2 class="text-2xl font-bold text-primary">Suresh Raina</h2>
<p class="text-neutral-custom font-medium text-base">Madanapalli</p>
<p class="text-neutral-custom text-sm">Expected: 12.0 kg</p>
</div>
<!-- Optional Map Placeholder for Context -->
<div class="mt-4 w-full h-40 bg-slate-100 rounded-lg overflow-hidden border border-primary/10">
<img class="w-full h-full object-cover" data-alt="A clean map view of a rural village area" data-location="Madanapalli" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbV3w-f4q0LDoKntAFYfZhy7Yzb5WLNM4aVJRULZw39Ks905wJFSIiENxE3T1lHAO-a67wMyCBk7LKDQLhvEI6RnwGLdRvbAPrjSlhF4xSUD1qF1gooZ0ghkj8tn0oQ1NPYQBbKmhdCa1f4hwBw4ajahH0Fl_Eom6_3XAusnRz-Q5dtnq8FYTvuPSyTklIoV0TZpwf71iQBvLekyV-uhyUxOZSR53MpwwfIrY_bd58EydJtm1rJZpM0uUFH5KpoQ1dp3JQc3QAdJU"/>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-md flex flex-col gap-3">
<button class="w-full h-[52px] bg-primary text-white font-bold rounded-lg flex items-center justify-center transition-opacity active:opacity-90">
                Start Collection
            </button>
<button class="w-full h-[52px] bg-white border border-primary text-primary font-bold rounded-lg flex items-center justify-center transition-colors active:bg-slate-50">
                Not the right stop
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<footer class="fixed bottom-0 left-0 right-0 h-[60px] bg-white border-t border-primary flex items-center justify-around px-2">
<!-- Home -->
<a class="flex flex-col items-center justify-center gap-1 flex-1" href="#">
<span class="material-symbols-outlined text-inactive-custom text-[24px]">home</span>
<span class="text-[10px] font-medium text-inactive-custom">Home</span>
</a>
<!-- Map (Active) -->
<a class="flex flex-col items-center justify-center gap-1 flex-1" href="#">
<span class="material-symbols-outlined fill text-primary text-[24px]">map</span>
<span class="text-[10px] font-bold text-primary">Map</span>
</a>
<!-- Collections -->
<a class="flex flex-col items-center justify-center gap-1 flex-1" href="#">
<span class="material-symbols-outlined text-inactive-custom text-[24px]">book_2</span>
<span class="text-[10px] font-medium text-inactive-custom">Collections</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center gap-1 flex-1" href="#">
<span class="material-symbols-outlined text-inactive-custom text-[24px]">settings</span>
<span class="text-[10px] font-medium text-inactive-custom">Settings</span>
</a>
</footer>
<!-- Spacer for fixed footer -->
<div class="h-[60px] w-full"></div>
</body></html>
